name: Playwright
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize environment
        uses: ./.github/actions/init

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Create environment file for runtime variables
        run: |
          echo "CF_TURNSTILE_SECRET_KEY=${{ vars.CF_TURNSTILE_SECRET_KEY }}" >> .env.local
          echo "EMAIL_RECIPIENT=${{ vars.EMAIL_RECIPIENT }}" >> .env.local
          echo "EMAIL_SENDER=${{ vars.EMAIL_SENDER }}" >> .env.local
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env.local
          echo "UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" >> .env.local
          echo "UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}" >> .env.local

      - name: Build project
        run: npm run build:test

      - name: Run Playwright tests
        run: npm run pw:test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
